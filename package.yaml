name: hledger-flow
version: 0.16.3
synopsis: An hledger workflow focusing on automated statement import and classification.
category: Finance, Console
license: GPL-3
author: "Andreas Pauley <hledger-flow@pauley.org.za>"
maintainer: "Andreas Pauley <hledger-flow@pauley.org.za>"
copyright: "2023 Andreas Pauley"
github: "apauley/hledger-flow"
bug-reports: https://github.com/apauley/hledger-flow/issues

extra-source-files:
  - README.org
  - ChangeLog.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Finance, Console

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README file.
description: Please see the README on GitHub at <https://github.com/apauley/hledger-flow#readme>

dependencies:
  - base >= 4.7 && < 5

library:
  source-dirs: src
  ghc-options:
    - -Wall
  dependencies:
    - turtle >= 1.6.2 && < 1.7
    - path >= 0.9.6 && < 0.10
    - path-io >= 1.8.2 && < 1.9
    - filepath >= 1.5.4.0 && < 1.6
    - exceptions >= 0.10.9 && < 0.11
    - text >= 2.1.3 && < 2.2
    - foldl >= 1.4.18 && < 1.5
    - containers >= 0.7 && < 0.8
    - time >= 1.12.2 && < 1.13
    - stm >= 2.5.3.1 && < 2.6
    - gitrev >= 1.3.1 && < 1.4

executables:
  hledger-flow:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
      - -Wall
      - -fPIC
    ld-options:
      - -dynamic # change to -static for a statically linked executable. Does not work on osx

    dependencies:
      - hledger-flow
      - path >= 0.9.6 && < 0.10
      - turtle >= 1.6.2 && < 1.7
      - text >= 2.1.3 && < 2.2
      - optparse-applicative >= 0.18.1.0 && < 0.19

tests:
  hledger-flow-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - hledger-flow
      - path >= 0.9.6 && < 0.10
      - path-io >= 1.8.2 && < 1.9
      - turtle >= 1.6.2 && < 1.7
      - HUnit
      - containers >= 0.7 && < 0.8
      - directory
      - foldl >= 1.4.18 && < 1.5
      - text >= 2.1.3 && < 2.2
      - time >= 1.12.2 && < 1.13
      - stm >= 2.5.3.1 && < 2.6
